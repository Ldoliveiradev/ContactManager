name: contact-manager

services:
  postgres:
    image: postgres:17-alpine
    container_name: contact-manager-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: contactmanager
      POSTGRES_USER: contactmanager
      POSTGRES_PASSWORD: contactmanager_dev_pwd
    ports:
      # Host 5433 → container 5432, to avoid colliding with any other local Postgres.
      - "5433:5432"
    volumes:
      - contactmanager-pgdata:/var/lib/postgresql/data
      # Scripts in this folder run automatically on first container start (empty data dir).
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contactmanager -d contactmanager"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: src/ContactManager.API/Dockerfile
    container_name: contact-manager-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Inside the Docker network the DB is reached by its service name, not localhost.
      # Double-underscore maps to the nested config key ConnectionStrings:Postgres.
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=contactmanager;Username=contactmanager;Password=contactmanager_dev_pwd"
      Jwt__Secret: "dev-only-signing-secret-change-me-at-least-32-characters-long"
      Jwt__Issuer: "contactmanager-api"
      Jwt__Audience: "contactmanager-clients"
      Jwt__ExpiryMinutes: "60"
      ASPNETCORE_ENVIRONMENT: "Development"
    ports:
      # Host 8085 → container 8080, to avoid colliding with other local services.
      - "8085:8080"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: contact-manager-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      # Host 4300 → container 80 (nginx). The SPA serves the app and proxies /api to api.
      - "4300:80"

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: contact-manager-pgadmin
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@contactmanager.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_SERVER_JSON_FILE: /pgadmin4/servers.json
    ports:
      - "5051:80"
    volumes:
      - contact-manager-pgadmin:/var/lib/pgadmin
      - ./db/pgadmin/servers.json:/pgadmin4/servers.json:ro
      - ./db/pgadmin/pgpass:/pgpass:ro

volumes:
  contactmanager-pgdata:
  contact-manager-pgadmin:
