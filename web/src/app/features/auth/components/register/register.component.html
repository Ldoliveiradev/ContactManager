<ui-card class="auth-card">
  <form [formGroup]="form" (ngSubmit)="submit()">
    <header class="auth-card__head">
      <h1>Contact Manager</h1>
      <p class="auth-card__subtitle">Create an account</p>
    </header>

    @if (error()) {
      <ui-alert>{{ error() }}</ui-alert>
    }

    <ui-form-field
      label="Username"
      [error]="form.controls.username.touched && form.controls.username.invalid ? 'Username is required.' : null"
    >
      <input id="reg-username" name="username" type="text" formControlName="username" autocomplete="username" aria-label="Username" placeholder="your-username" appAutofocus />
    </ui-form-field>

    <ui-form-field
      label="First name"
      [error]="form.controls.firstName.touched && form.controls.firstName.invalid ? 'First name is required.' : null"
    >
      <input id="reg-firstName" name="firstName" type="text" formControlName="firstName" autocomplete="given-name" aria-label="First name" placeholder="Jane" />
    </ui-form-field>

    <ui-form-field
      label="Last name"
      [error]="form.controls.lastName.touched && form.controls.lastName.invalid ? 'Last name is required.' : null"
    >
      <input id="reg-lastName" name="lastName" type="text" formControlName="lastName" autocomplete="family-name" aria-label="Last name" placeholder="Doe" />
    </ui-form-field>

    <ui-form-field
      label="Email"
      [error]="form.controls.email.touched && form.controls.email.invalid ? 'Enter a valid email address.' : null"
    >
      <input id="reg-email" name="email" type="email" formControlName="email" autocomplete="email" aria-label="Email" placeholder="jane@example.com" />
    </ui-form-field>

    <ui-form-field
      label="Password"
      [error]="form.controls.password.touched && form.controls.password.invalid ? 'Password must be at least 8 characters.' : null"
    >
      <input id="reg-password" name="password" type="password" formControlName="password" autocomplete="new-password" aria-label="Password" placeholder="••••••••" />
    </ui-form-field>

    <ui-button type="submit" [disabled]="loading()">
      {{ loading() ? 'Please wait…' : 'Register' }}
    </ui-button>

    <ui-button type="button" variant="ghost" (click)="switchToLogin.emit()">
      Already have an account? Sign in
    </ui-button>
  </form>
</ui-card>
