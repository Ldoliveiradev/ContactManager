<ui-card class="form-card">
  <h2>{{ editId() ? 'Edit contact' : 'New contact' }}</h2>

  @if (error()) {
    <ui-alert>{{ error() }}</ui-alert>
  }

  <form [formGroup]="form" (ngSubmit)="submit()">
    <ui-form-field
      label="Name"
      [error]="form.controls.name.touched && form.controls.name.invalid ? 'Name is required.' : null"
    >
      <input type="text" formControlName="name" aria-label="Name" placeholder="Jane Doe" appAutofocus />
    </ui-form-field>

    <ui-form-field
      label="Email"
      [error]="form.controls.email.touched && form.controls.email.invalid ? 'A valid email is required.' : null"
    >
      <input type="email" formControlName="email" aria-label="Email" placeholder="jane@example.com" />
    </ui-form-field>

    <ui-form-field label="Phone" [optional]="true">
      <input type="tel" formControlName="phone" aria-label="Phone" placeholder="(202) 555-0100" />
    </ui-form-field>

    <div class="form-actions">
      <ui-button type="button" variant="secondary" (click)="cancel()">Cancel</ui-button>
      <ui-button type="submit" [disabled]="saving()">{{ saving() ? 'Saving…' : 'Save' }}</ui-button>
    </div>
  </form>
</ui-card>
