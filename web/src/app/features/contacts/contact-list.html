<header class="list-header">
  <h2>Your contacts</h2>
  <a class="new-link" routerLink="/contacts/new">
    <ui-button><fa-icon [icon]="faPlus" /> New contact</ui-button>
  </a>
</header>

@if (error()) {
  <ui-alert>{{ error() }}</ui-alert>
}

@if (loading()) {
  <p class="muted">Loading…</p>
} @else if (items().length === 0) {
  <div class="empty">
    <p>No contacts yet.</p>
    <a routerLink="/contacts/new"><ui-button>Add your first contact</ui-button></a>
  </div>
} @else {
  <ui-grid
    [items]="items()"
    [columns]="columns"
    [pageSize]="6"
    searchPlaceholder="Search contacts…"
    emptyMessage="No contacts match your search."
  >
    <!-- Custom cell: name with avatar -->
    <ng-template uiGridCell="name" let-row>
      <div class="cell-name">
        <span class="cell-name__avatar" aria-hidden="true">{{ row.name.charAt(0) }}</span>
        <span class="cell-name__text" [title]="row.name">{{ row.name }}</span>
      </div>
    </ng-template>

    <!-- Custom cell: email -->
    <ng-template uiGridCell="email" let-row>
      <span class="cell-muted" [title]="row.email"><fa-icon [icon]="faEnvelope" /> {{ row.email }}</span>
    </ng-template>

    <!-- Custom cell: phone (formatted) -->
    <ng-template uiGridCell="phone" let-row>
      <span class="cell-muted"><fa-icon [icon]="faPhone" /> {{ row.phone | phone }}</span>
    </ng-template>

    <!-- Row actions -->
    <ng-template uiGridActions let-row>
      <button
        type="button"
        class="icon-action"
        [attr.aria-label]="'Edit ' + row.name"
        (click)="editContact(row)"
      >
        <fa-icon [icon]="faPenToSquare" /> <span>Edit</span>
      </button>
      <button
        type="button"
        class="icon-action icon-action--danger"
        [attr.aria-label]="'Delete ' + row.name"
        (click)="remove(row)"
      >
        <fa-icon [icon]="faTrashCan" /> <span>Delete</span>
      </button>
    </ng-template>
  </ui-grid>
}
