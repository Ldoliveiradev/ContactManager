<ui-card class="form-card">
  <h2>{{ editId() ? 'Edit contact' : 'New contact' }}</h2>

  @if (error()) {
    <ui-alert>{{ error() }}</ui-alert>
  }

  <form [formGroup]="form" (ngSubmit)="submit()">
    <ui-form-field label="Name" [error]="errorFor('name')">
      <input id="name" name="name" type="text" autocomplete="name" formControlName="name" aria-label="Name" placeholder="Jane Doe" appAutofocus />
    </ui-form-field>

    <ui-form-field label="Email" [error]="errorFor('email')">
      <input id="contact-email" name="email" type="email" autocomplete="email" formControlName="email" aria-label="Email" placeholder="jane@example.com" />
    </ui-form-field>

    <ui-form-field label="Phone" [optional]="true" [error]="errorFor('phone')">
      <input id="phone" name="phone" type="tel" autocomplete="tel" formControlName="phone" aria-label="Phone" placeholder="(202) 555-0100" />
    </ui-form-field>

    <div class="form-actions">
      <ui-button type="button" variant="secondary" (click)="cancel()">Cancel</ui-button>
      <ui-button type="submit" [disabled]="saving()">{{ saving() ? 'Saving…' : 'Save' }}</ui-button>
    </div>
  </form>
</ui-card>
