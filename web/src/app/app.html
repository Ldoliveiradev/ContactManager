@if (isAuthenticated()) {
  <header class="app-header">
    <div class="header-left">
      <a routerLink="/" class="brand">Contact Manager</a>
    </div>
    <nav class="header-nav">
      <a
        routerLink="/"
        routerLinkActive="nav-link--active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="nav-link"
        aria-label="Home"
      >
        <fa-icon [icon]="faHome" class="nav-link__icon" />
        <span class="nav-link__label">Home</span>
      </a>
      <a routerLink="/contacts" routerLinkActive="nav-link--active" class="nav-link" aria-label="Contacts">
        <fa-icon [icon]="faContacts" class="nav-link__icon" />
        <span class="nav-link__label">Contacts</span>
      </a>
      <a routerLink="/accounts" routerLinkActive="nav-link--active" class="nav-link" aria-label="Profile">
        <fa-icon [icon]="faProfile" class="nav-link__icon" />
        <span class="nav-link__label">Profile</span>
      </a>
    </nav>
    <div class="header-actions">
      <button type="button" class="theme-btn" (click)="toggleTheme()">
        <fa-icon [icon]="themeIcon()" /> {{ themeLabel() }}
      </button>
      <button type="button" class="logout" (click)="logout()">
        <fa-icon [icon]="faLogout" /> Log out
      </button>
    </div>
  </header>
} @else {
  <button type="button" class="floating-theme" (click)="toggleTheme()" aria-label="Toggle theme">
    <fa-icon [icon]="themeIcon()" />
  </button>
}

<ui-toast />

<main class="app-main">
  <router-outlet />
</main>
