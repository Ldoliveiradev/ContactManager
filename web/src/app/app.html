@if (isAuthenticated()) {
  <header class="app-header">
    <span class="brand">Contact Manager</span>
    <div class="header-actions">
      <button type="button" class="icon-btn" (click)="toggleTheme()" [attr.aria-label]="'Toggle theme'">
        {{ theme() === 'dark' ? '☀️' : '🌙' }}
      </button>
      <button type="button" class="logout" (click)="logout()">Log out</button>
    </div>
  </header>
} @else {
  <!-- Floating theme toggle for the login screen -->
  <button type="button" class="floating-theme" (click)="toggleTheme()" [attr.aria-label]="'Toggle theme'">
    {{ theme() === 'dark' ? '☀️' : '🌙' }}
  </button>
}

<main class="app-main">
  <router-outlet />
</main>
