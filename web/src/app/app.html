@if (isAuthenticated()) {
  <header class="app-header">
    <div class="header-left">
      <a routerLink="/contacts" class="brand">Contact Manager</a>
    </div>
    <nav class="header-nav">
      <a routerLink="/contacts" routerLinkActive="nav-link--active" class="nav-link">Contacts</a>
      <a routerLink="/profile" routerLinkActive="nav-link--active" class="nav-link">Profile</a>
    </nav>
    <div class="header-actions">
      <button type="button" class="theme-btn" (click)="toggleTheme()">
        <fa-icon [icon]="themeIcon()" /> {{ themeLabel() }}
      </button>
      <button type="button" class="logout" (click)="logout()">
        <fa-icon [icon]="faLogout" /> Log out
      </button>
    </div>
  </header>
} @else {
  <button type="button" class="floating-theme" (click)="toggleTheme()" aria-label="Toggle theme">
    <fa-icon [icon]="themeIcon()" />
  </button>
}

<main class="app-main">
  <router-outlet />
</main>
