@if (isAuthenticated()) {
  <header class="app-header">
    <span class="brand">Contact Manager</span>
    <div class="header-actions">
      <a routerLink="/profile" class="icon-btn" aria-label="Profile">
        <fa-icon [icon]="faUser" />
      </a>
      <button type="button" class="icon-btn" (click)="toggleTheme()" aria-label="Toggle theme">
        <fa-icon [icon]="themeIcon()" />
      </button>
      <button type="button" class="logout" (click)="logout()">
        <fa-icon [icon]="faLogout" /> Log out
      </button>
    </div>
  </header>
} @else {
  <button type="button" class="floating-theme" (click)="toggleTheme()" aria-label="Toggle theme">
    <fa-icon [icon]="themeIcon()" />
  </button>
}

<main class="app-main">
  <router-outlet />
</main>
