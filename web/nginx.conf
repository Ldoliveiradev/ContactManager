server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA routing: serve index.html for any unmatched path so Angular's router handles it.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the API container on the Docker network.
    # The SPA uses a relative "/api" base, so no host port or CORS is involved.
    # Static upstream (resolved once at startup from the compose network) — keeps the
    # full "/api/..." path and binds to this project's api service.
    location /api/ {
        proxy_pass http://api:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
